<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TokenSaver9000 — DOCX/PDF to Markdown</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  h1 {
    font-size: 1.8rem;
    margin-bottom: 0.25rem;
    color: #fff;
  }

  .subtitle {
    color: #888;
    margin-bottom: 1.5rem;
    font-size: 0.95rem;
  }

  .drop-zone {
    width: 100%;
    max-width: 1400px;
    border: 2px dashed #3a3f4b;
    border-radius: 12px;
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: #161822;
    margin-bottom: 1.5rem;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: #6c8cff;
    background: #1a1e2e;
  }

  .drop-zone p { font-size: 1.05rem; color: #aaa; }
  .drop-zone .browse { color: #6c8cff; text-decoration: underline; cursor: pointer; }

  #file-input { display: none; }

  .output-area {
    width: 100%;
    max-width: 1400px;
    display: none;
    flex-direction: column;
    gap: 0.75rem;
  }

  .output-area.visible { display: flex; }

  .file-name {
    font-size: 0.9rem;
    color: #888;
  }

  .actions {
    display: flex;
    gap: 0.5rem;
  }

  button {
    padding: 0.55rem 1.2rem;
    border: none;
    border-radius: 6px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-primary { background: #6c8cff; color: #fff; }
  .btn-primary:hover { background: #5a7ae6; }
  .btn-secondary { background: #2a2e3a; color: #ccc; }
  .btn-secondary:hover { background: #353a48; }

  #markdown-output {
    width: 100%;
    min-height: 700px;
    background: #1a1d28;
    border: 1px solid #2a2e3a;
    border-radius: 8px;
    padding: 1rem;
    color: #d4d4d4;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 0.85rem;
    line-height: 1.55;
    resize: vertical;
    tab-size: 4;
  }

  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #2d3348;
    color: #e0e0e0;
    padding: 0.6rem 1.2rem;
    border-radius: 8px;
    font-size: 0.85rem;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .stats {
    font-size: 0.8rem;
    color: #666;
    display: flex;
    gap: 1.5rem;
  }

  .savings-banner {
    width: 100%;
    max-width: 1400px;
    background: linear-gradient(135deg, #1a2a1a, #1a2e1e);
    border: 1px solid #2a4a2a;
    border-radius: 10px;
    padding: 1rem 1.25rem;
    display: none;
    gap: 1rem;
    align-items: center;
    margin-bottom: 0.75rem;
  }

  .savings-banner.visible { display: flex; }

  .savings-pct {
    font-size: 1.8rem;
    font-weight: 700;
    color: #5cdf5c;
    line-height: 1;
    white-space: nowrap;
  }

  .savings-detail {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
    font-size: 0.82rem;
    color: #a0b8a0;
  }

  .savings-detail strong { color: #cde6cd; }

  .savings-bar-track {
    width: 100%;
    height: 6px;
    background: #2a3a2a;
    border-radius: 3px;
    overflow: hidden;
    margin-top: 0.15rem;
  }

  .savings-bar-fill {
    height: 100%;
    background: #5cdf5c;
    border-radius: 3px;
    transition: width 0.6s ease;
  }
</style>
</head>
<body>

<h1>TokenSaver9000</h1>
<p class="subtitle">Convert .docx / .pdf to clean Markdown — save tokens, keep formatting</p>

<div class="drop-zone" id="drop-zone">
  <p>Drag &amp; drop a <strong>.docx</strong> or <strong>.pdf</strong> file here</p>
  <p>or <span class="browse" id="browse-btn">browse files</span></p>
</div>
<input type="file" id="file-input" accept=".docx,.pdf">

<div class="savings-banner" id="savings-banner">
  <div class="savings-pct" id="savings-pct"></div>
  <div style="flex:1;">
    <div class="savings-detail" id="savings-detail"></div>
    <div class="savings-bar-track"><div class="savings-bar-fill" id="savings-bar"></div></div>
  </div>
</div>

<div class="output-area" id="output-area">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <span class="file-name" id="file-name"></span>
    <div class="stats" id="stats"></div>
  </div>
  <div class="actions">
    <button class="btn-primary" id="download-btn">Download .md</button>
    <button class="btn-secondary" id="copy-btn">Copy to clipboard</button>
  </div>
  <textarea id="markdown-output" spellcheck="false"></textarea>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── DOM refs ───────────────────────────────────────────────────
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const browseBtn = document.getElementById('browse-btn');
const outputArea = document.getElementById('output-area');
const mdOutput = document.getElementById('markdown-output');
const downloadBtn = document.getElementById('download-btn');
const copyBtn = document.getElementById('copy-btn');
const fileNameEl = document.getElementById('file-name');
const statsEl = document.getElementById('stats');
const toastEl = document.getElementById('toast');
const savingsBanner = document.getElementById('savings-banner');
const savingsPct = document.getElementById('savings-pct');
const savingsDetail = document.getElementById('savings-detail');
const savingsBar = document.getElementById('savings-bar');

let currentFileName = '';

// ─── UI wiring ──────────────────────────────────────────────────
browseBtn.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('click', (e) => { if (e.target !== browseBtn) fileInput.click(); });

dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});

fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

downloadBtn.addEventListener('click', () => {
  const blob = new Blob([mdOutput.value], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = currentFileName.replace(/\.docx$/i, '') + '.md';
  a.click();
  URL.revokeObjectURL(a.href);
});

copyBtn.addEventListener('click', () => {
  navigator.clipboard.writeText(mdOutput.value).then(() => showToast('Copied to clipboard'));
});

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 2000);
}

// ─── Main handler ───────────────────────────────────────────────
async function handleFile(file) {
  const lower = file.name.toLowerCase();
  const isDocx = lower.endsWith('.docx');
  const isPdf = lower.endsWith('.pdf');
  if (!isDocx && !isPdf) {
    showToast('Please upload a .docx or .pdf file');
    return;
  }
  currentFileName = file.name;
  fileNameEl.textContent = file.name;

  try {
    showToast(isPdf ? 'Processing PDF…' : 'Processing DOCX…');
    const { markdown: md, sourceSize } = isPdf
      ? await convertPdfToMarkdown(file)
      : await convertDocxToMarkdown(file);
    mdOutput.value = md;
    outputArea.classList.add('visible');

    const mdSize = md.length;
    const mdTokens = Math.round(mdSize / 4);
    const srcTokens = Math.round(sourceSize / 4);
    const saved = sourceSize - mdSize;
    const savedPct = sourceSize > 0 ? Math.round((saved / sourceSize) * 100) : 0;

    statsEl.textContent = `${mdSize.toLocaleString()} chars · ~${mdTokens.toLocaleString()} tokens`;

    const sourceLabel = isPdf ? 'PDF source' : 'XML source';
    savingsPct.textContent = `${savedPct}%`;
    savingsDetail.innerHTML =
      `<span><strong>${sourceLabel}:</strong> ~${srcTokens.toLocaleString()} tokens (${sourceSize.toLocaleString()} chars)</span>` +
      `<span><strong>Markdown:</strong> ~${mdTokens.toLocaleString()} tokens (${mdSize.toLocaleString()} chars)</span>` +
      `<span><strong>Saved:</strong> ~${(srcTokens - mdTokens).toLocaleString()} tokens</span>`;
    savingsBar.style.width = Math.max(0, savedPct) + '%';
    savingsBanner.classList.add('visible');

    showToast('Conversion complete');
  } catch (err) {
    console.error(err);
    showToast('Error converting file — see console');
  }
}

// ─── DOCX → Markdown converter ─────────────────────────────────

async function convertDocxToMarkdown(file) {
  const arrayBuffer = await file.arrayBuffer();
  const zip = await JSZip.loadAsync(arrayBuffer);

  let sourceSize = 0;
  const styleNumMap = {};  // styleId → numId (explicit or inherited)
  const styleBaseMap = {}; // styleId → basedOn styleId

  // 1. Parse styles.xml — build styleId → numId map with basedOn inheritance
  if (zip.file('word/styles.xml')) {
    const stylesXmlStr = await zip.file('word/styles.xml').async('text');
    sourceSize += stylesXmlStr.length;
    const stylesDoc = new DOMParser().parseFromString(stylesXmlStr, 'text/xml');

    const styles = stylesDoc.getElementsByTagName('w:style');
    for (let i = 0; i < styles.length; i++) {
      const style = styles[i];
      const type = style.getAttribute('w:type');
      const styleId = style.getAttribute('w:styleId');

      if (type === 'paragraph') {
        const numIds = style.getElementsByTagName('w:numId');
        if (numIds.length > 0) {
          styleNumMap[styleId] = numIds[0].getAttribute('w:val');
        }

        const basedOns = style.getElementsByTagName('w:basedOn');
        if (basedOns.length > 0) {
          styleBaseMap[styleId] = basedOns[0].getAttribute('w:val');
        }
      }
    }

    // Resolve inheritance — derived styles pick up numId from their base.
    // Iterate until fixed point (bounded to avoid pathological loops).
    let changed = true;
    for (let i = 0; i < 10 && changed; i++) {
      changed = false;
      for (const styleId in styleBaseMap) {
        const baseId = styleBaseMap[styleId];
        if (!(styleId in styleNumMap) && baseId in styleNumMap) {
          styleNumMap[styleId] = styleNumMap[baseId];
          changed = true;
        }
      }
    }
  }

  // 2. Parse document.xml
  const markdownOutput = [];
  if (zip.file('word/document.xml')) {
    const docXmlStr = await zip.file('word/document.xml').async('text');
    sourceSize += docXmlStr.length;
    const documentDoc = new DOMParser().parseFromString(docXmlStr, 'text/xml');

    const listCounters = {};
    const paragraphs = documentDoc.getElementsByTagName('w:p');

    for (let i = 0; i < paragraphs.length; i++) {
      const p = paragraphs[i];

      let pNumId = '';
      let pStyleId = '';
      let pFirstLineIndent = '';

      // Extract paragraph properties
      const pPrs = p.getElementsByTagName('w:pPr');
      if (pPrs.length > 0) {
        const pPr = pPrs[0];
        const numIds = pPr.getElementsByTagName('w:numId');
        if (numIds.length > 0) pNumId = numIds[0].getAttribute('w:val') || '';

        const pStyles = pPr.getElementsByTagName('w:pStyle');
        if (pStyles.length > 0) pStyleId = pStyles[0].getAttribute('w:val') || '';

        const inds = pPr.getElementsByTagName('w:ind');
        if (inds.length > 0) {
          pFirstLineIndent = inds[0].getAttribute('w:firstLine') || '';
        }
      }

      // Determine list context: explicit numId wins, then inherited from style.
      const styleNum = styleNumMap[pStyleId] || '';
      let listNum = '';

      if (pNumId !== '') {
        listNum = pNumId === '0' ? '' : pNumId;
      } else if (styleNum !== '' && styleNum !== '0') {
        listNum = styleNum;
      }

      let paraNumberText = '';
      let tabText = '';

      if (listNum !== '') {
        listCounters[listNum] = (listCounters[listNum] || 0) + 1;
        paraNumberText = listCounters[listNum] + '. ';
      }

      if (pFirstLineIndent !== '') {
        const val = parseInt(pFirstLineIndent, 10);
        if (!isNaN(val) && val > 0) {
          // 1 inch = 1440 twips. 0.5 inches = 720 twips → one tab.
          const numTabs = Math.round(val / 720.0);
          if (numTabs > 0) tabText = '\t'.repeat(numTabs);
        }
      }

      // Process text runs
      let pText = '';
      const runs = p.getElementsByTagName('w:r');
      for (let j = 0; j < runs.length; j++) {
        const run = runs[j];
        let runText = '';
        const textNodes = run.getElementsByTagName('w:t');
        for (let k = 0; k < textNodes.length; k++) {
          runText += textNodes[k].textContent;
        }
        if (!runText) continue;

        let isBold = false;
        let isItalic = false;
        let isStrike = false;
        let isUnderline = false;
        const rPrs = run.getElementsByTagName('w:rPr');
        if (rPrs.length > 0) {
          const rPr = rPrs[0];
          if (hasToggleProp(rPr, 'w:b')) isBold = true;
          if (hasToggleProp(rPr, 'w:i')) isItalic = true;
          if (hasToggleProp(rPr, 'w:strike') || hasToggleProp(rPr, 'w:dstrike')) {
            isStrike = true;
          }
          const uEls = rPr.getElementsByTagName('w:u');
          if (uEls.length > 0) {
            const uVal = uEls[0].getAttribute('w:val');
            if (uVal !== 'none' && uVal !== '0' && uVal !== 'false') {
              isUnderline = true;
            }
          }
        }

        // Markdown has no underline — promote to bold so emphasis survives.
        if (isUnderline) isBold = true;

        // Wrap the non-whitespace core with markdown emphasis.
        // Nesting order: strike wraps bold wraps italic.
        if (runText.trim().length > 0) {
          const prefix = runText.match(/^\s*/)[0];
          const suffix = runText.match(/\s*$/)[0];
          let core = runText.trim();

          if (isItalic) core = '*' + core + '*';
          if (isBold) core = '**' + core + '**';
          if (isStrike) core = '~~' + core + '~~';

          runText = prefix + core + suffix;
        }

        pText += runText;
      }

      // Only add paragraphs that actually have content or list markers
      const injectionText = tabText + paraNumberText;
      if (pText.trim() !== '' || paraNumberText !== '') {
        markdownOutput.push(injectionText + pText);
      }
    }
  }

  const rawMarkdown = collapseBlankLines(markdownOutput.join('\n\n'));
  return { markdown: ensureParagraphNumbers(rawMarkdown), sourceSize };
}

// ─── PDF → Markdown converter ──────────────────────────────────
// Uses pdf.js to extract the text layer page-by-page. If a page has
// effectively no text (image-only scan), the page is rendered to a
// canvas and run through Tesseract.js OCR.

async function convertPdfToMarkdown(file) {
  const arrayBuffer = await file.arrayBuffer();
  const sourceSize = arrayBuffer.byteLength;

  // pdf.js worker setup — match the CDN version loaded in <head>.
  if (window.pdfjsLib && pdfjsLib.GlobalWorkerOptions) {
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }

  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const pageChunks = [];

  for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
    const page = await pdf.getPage(pageNum);

    // Try the embedded text layer first.
    let pageText = await extractPdfPageText(page);

    // If the page has essentially no extractable text, fall back to OCR.
    if (pageText.replace(/\s+/g, '').length < 20) {
      try {
        pageText = await ocrPdfPage(page);
      } catch (ocrErr) {
        console.error('OCR failed on page ' + pageNum + ':', ocrErr);
      }
    }

    pageChunks.push(pageText.trim());
  }

  const rawMarkdown = collapseBlankLines(pageChunks.join('\n\n'));
  return { markdown: ensureParagraphNumbers(rawMarkdown), sourceSize };
}

async function extractPdfPageText(page) {
  const textContent = await page.getTextContent();
  // Group text items by rounded y so we can rebuild lines. PDF
  // coordinates are bottom-up, so we sort y descending.
  const lineMap = new Map();
  for (const item of textContent.items) {
    if (!item.str) continue;
    const y = Math.round(item.transform[5]);
    if (!lineMap.has(y)) lineMap.set(y, []);
    lineMap.get(y).push(item);
  }

  const ys = Array.from(lineMap.keys()).sort((a, b) => b - a);
  const lines = [];
  for (const y of ys) {
    const items = lineMap.get(y);
    items.sort((a, b) => a.transform[4] - b.transform[4]);
    const lineText = items.map((it) => it.str).join(' ').replace(/\s+/g, ' ').trim();
    if (lineText) lines.push(lineText);
  }
  return lines.join('\n');
}

async function ocrPdfPage(page) {
  if (!window.Tesseract) {
    throw new Error('Tesseract.js not loaded');
  }
  // Render the page to a canvas at 2x scale for better OCR accuracy.
  const viewport = page.getViewport({ scale: 2.0 });
  const canvas = document.createElement('canvas');
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  const ctx = canvas.getContext('2d');
  await page.render({ canvasContext: ctx, viewport: viewport }).promise;

  const { data } = await Tesseract.recognize(canvas, 'eng');
  return (data && data.text) ? data.text : '';
}

// ─── Run-property helpers ───────────────────────────────────────

function hasToggleProp(rPr, propName) {
  const els = rPr.getElementsByTagName(propName);
  if (els.length === 0) return false;
  const val = els[0].getAttribute('w:val');
  // Toggle properties: absent/empty/"1"/"true" = on; "0"/"false" = off.
  return val === null || val === '' || val === '1' || val === 'true';
}

// ─── Paragraph numbering fallback ───────────────────────────────
// Edge case: when numbering.xml doesn't clearly define numbering,
// paragraphs come out unnumbered. Do a final pass to detect whether
// the output already has paragraph numbers (from the XML list machinery
// or baked into the text itself) and, if not, inject them.
//
// Patent-document handling: when the text contains a "WHAT IS CLAIMED
// IS" marker, numbering for the body ends there, the claim block that
// follows restarts at 1, and numbering stops entirely once an "ABSTRACT"
// section marker (or EOF) is reached. Headers are never numbered.

// Matches common paragraph-number prefixes:
//   "1.", "1)", "(1)", "1.1.", "1.1", "1.2.3", etc.
const PARA_NUMBER_RE = /^\s*(\(?\d+(\.\d+)*[.)]|\d+(\.\d+)+)\s+\S/;

function isTextParagraph(line) {
  const trimmed = line.trim();
  if (!trimmed) return false;
  if (trimmed.startsWith('#')) return false;     // heading
  if (trimmed.startsWith('|')) return false;     // table row/separator
  if (/^[-*+]\s/.test(trimmed)) return false;    // bullet list
  if (/^>\s/.test(trimmed)) return false;        // blockquote
  return true;
}

function ensureParagraphNumbers(markdown) {
  const lines = markdown.split('\n');

  // Detect patent-style section markers. Anchored to the start of the
  // line (after optional markdown formatting) so we don't match the
  // phrase when it appears mid-sentence.
  const whatIsClaimedRe = /^[#>\s*_]*what\s+is\s+claimed\s+is\b/i;
  const abstractRe = /^[#>\s*_]*abstract\b/i;

  let claimsStart = -1;
  for (let i = 0; i < lines.length; i++) {
    if (whatIsClaimedRe.test(lines[i])) { claimsStart = i; break; }
  }

  let claimsEnd = lines.length;
  if (claimsStart !== -1) {
    for (let i = claimsStart + 1; i < lines.length; i++) {
      if (abstractRe.test(lines[i])) { claimsEnd = i; break; }
    }
  }

  // Region 1: body paragraphs (up to, but not including, the
  // "WHAT IS CLAIMED IS" marker).
  const bodyEnd = claimsStart === -1 ? lines.length : claimsStart;
  numberRegion(lines, 0, bodyEnd);

  // Region 2: claims block — restart counter at 1, stop at ABSTRACT/EOF.
  // The marker line itself is skipped (start + 1).
  if (claimsStart !== -1) {
    numberRegion(lines, claimsStart + 1, claimsEnd);
  }

  // Region 3 (post-ABSTRACT) is intentionally left un-numbered.

  return lines.join('\n');
}

function numberRegion(lines, start, end) {
  // Collect indices of candidate paragraph lines in [start, end).
  const candidates = [];
  for (let i = start; i < end; i++) {
    if (isTextParagraph(lines[i])) candidates.push(i);
  }

  // Nothing to do for trivially small regions.
  if (candidates.length < 2) return;

  // How many already look numbered?
  const numberedCount = candidates.filter(
    (i) => PARA_NUMBER_RE.test(lines[i])
  ).length;
  const ratio = numberedCount / candidates.length;

  // If a meaningful fraction already carries numbering, leave this
  // region alone — the numbering machinery (or the author) handled it.
  if (ratio >= 0.3) return;

  // Otherwise inject paragraph numbers. Skip paragraphs that already
  // happen to start with a numbering prefix to avoid double-numbering.
  let counter = 1;
  for (const i of candidates) {
    if (!PARA_NUMBER_RE.test(lines[i])) {
      lines[i] = counter + '. ' + lines[i];
    }
    counter++;
  }
}

// ─── Helpers ────────────────────────────────────────────────────

function collapseBlankLines(text) {
  return text.replace(/\n{3,}/g, '\n\n').trim() + '\n';
}
</script>

</body>
</html>
